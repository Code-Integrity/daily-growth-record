services:
  app:
    build: ./docker/php
    tty: true
    stdin_open: true
    volumes:
      - ./src:/var/www/html

  nginx:
    image: nginx:latest
    ports:
      - "9999:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: growth_db
    ports:
      - "3306:3306" # 個人用なので標準ポートを独占
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
