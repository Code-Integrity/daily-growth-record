services:
  app:  
    build: .
    tty: true
    stdin_open: true
    volumes:
      - .:/var/www/html

  nginx:  
    image: nginx:latest
    ports:
      - "9999:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:  
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: growth_db
    ports:
      - "3307:3306"
